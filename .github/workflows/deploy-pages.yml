name: Deploy Pages

on:
  workflow_run:
    workflows:
      - Package sources
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - public/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  deployments: write

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: 2G
  PAGES_PROJECT_NAME: aidoku-novel-sources

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Download Pages bundle
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: pages-public
          path: public
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        if: github.event_name != 'workflow_run'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
            sources/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust components
        if: github.event_name != 'workflow_run'
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Install build dependencies
        if: github.event_name != 'workflow_run'
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache
          if ! command -v aidoku >/dev/null 2>&1; then
            cargo install --git https://github.com/Aidoku/aidoku-rs aidoku-cli
          fi

      - name: Build Pages bundle
        if: github.event_name != 'workflow_run'
        run: |
          for src in sources/*; do
            if [ -d "$src" ]; then
              (
                cd "$src"
                aidoku package
              )
            fi
          done
          aidoku verify sources/*/package.aix
          aidoku build sources/*/package.aix --output public --name "Aidoku Novel Sources"

      - name: Publish to Cloudflare Pages
        id: cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ env.PAGES_PROJECT_NAME }} --branch=main --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
