name: Package sources

on:
  push:
    branches:
      - main
    paths:
      - Cargo.lock
      - Cargo.toml
      - sources/**
      - .github/workflows/package.yml
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - sources/**
      - .github/workflows/package.yml
  workflow_dispatch:

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: 2G

jobs:
  package:
    name: Package and verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
            sources/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust components
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustup component add clippy rustfmt

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache
          if ! command -v aidoku >/dev/null 2>&1; then
            cargo install --git https://github.com/Aidoku/aidoku-rs aidoku-cli
          fi

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint sources
        run: cargo clippy --workspace --target wasm32-unknown-unknown -- -D warnings

      - name: Package sources
        run: |
          for src in sources/*; do
            if [ -d "$src" ]; then
              (
                cd "$src"
                aidoku package
              )
            fi
          done

      - name: Verify packages
        run: aidoku verify sources/*/package.aix

      - name: Build source list
        run: aidoku build sources/*/package.aix --output public --name "Aidoku Novel Sources"

      - name: Upload Pages bundle
        uses: actions/upload-artifact@v4
        with:
          name: pages-public
          path: public
          if-no-files-found: error
          retention-days: 7

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: source-packages
          path: public/sources/*.aix
          if-no-files-found: error
          retention-days: 7
